<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>404 - Page Not Found | Job Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2f; /* Dark color from header/footer */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        /* Animated background elements with teal accent */
        .bg-bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background: rgba(78, 205, 196, 0.1); /* Teal with low opacity */
            bottom: -160px;
            animation: square 25s infinite;
            transition-timing-function: linear;
            border-radius: 50%;
        }

        .bg-bubbles li:nth-child(1) {
            left: 10%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
            animation-duration: 12s;
        }

        .bg-bubbles li:nth-child(2) {
            left: 20%;
            width: 60px;
            height: 60px;
            background: rgba(78, 205, 196, 0.15);
            animation-delay: 2s;
            animation-duration: 15s;
        }

        .bg-bubbles li:nth-child(3) {
            left: 35%;
            width: 120px;
            height: 120px;
            background: rgba(78, 205, 196, 0.08);
            animation-delay: 4s;
            animation-duration: 20s;
        }

        .bg-bubbles li:nth-child(4) {
            left: 50%;
            width: 50px;
            height: 50px;
            background: rgba(78, 205, 196, 0.12);
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .bg-bubbles li:nth-child(5) {
            left: 65%;
            width: 100px;
            height: 100px;
            background: rgba(78, 205, 196, 0.1);
            animation-delay: 3s;
            animation-duration: 22s;
        }

        .bg-bubbles li:nth-child(6) {
            left: 80%;
            width: 70px;
            height: 70px;
            background: rgba(78, 205, 196, 0.15);
            animation-delay: 1s;
            animation-duration: 16s;
        }

        .bg-bubbles li:nth-child(7) {
            left: 90%;
            width: 45px;
            height: 45px;
            background: rgba(78, 205, 196, 0.08);
            animation-delay: 5s;
            animation-duration: 14s;
        }

        .bg-bubbles li:nth-child(8) {
            left: 25%;
            width: 90px;
            height: 90px;
            background: rgba(78, 205, 196, 0.12);
            animation-delay: 6s;
            animation-duration: 24s;
        }

        @keyframes square {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 50%;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* 404 Number Animation - White with teal shadow */
        .four-zero-four {
            font-size: 180px;
            font-weight: 800;
            color: white;
            text-shadow: 0 10px 30px rgba(78, 205, 196, 0.3); /* Teal shadow */
            line-height: 1;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .four-zero-four span {
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        .four-zero-four span:nth-child(1) { animation-delay: 0s; }
        .four-zero-four span:nth-child(2) { animation-delay: 0.2s; }
        .four-zero-four span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Title Animation - White */
        .title {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 15px;
            animation: slideInDown 0.8s ease-out;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Description Animation - Light white */
        .description {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            line-height: 1.6;
            animation: fadeIn 1s ease-out 0.3s both;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Button Styles - Using #4ecdc4 (teal) and #1e1e2f (dark) */
        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #4ecdc4; /* Teal accent */
            color: #1e1e2f; /* Dark color */
            text-decoration: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.3);
            border: 2px solid transparent;
            animation: pulse 2s infinite;
            margin: 0 auto;
            max-width: 280px;
            width: 100%;
        }

        .home-btn i {
            font-size: 18px;
            transition: transform 0.3s ease;
            color: #1e1e2f; /* Dark color */
        }

        .home-btn:hover {
            background: transparent;
            color: #4ecdc4; /* Teal */
            border-color: #4ecdc4;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(78, 205, 196, 0.4);
            animation: none;
        }

        .home-btn:hover i {
            transform: translateX(-5px);
            color: #4ecdc4; /* Teal */
        }

        .home-btn:active {
            transform: translateY(0);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(78, 205, 196, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(78, 205, 196, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(78, 205, 196, 0);
            }
        }

        /* Responsive Design - NO HORIZONTAL SCROLL */
        @media (max-width: 768px) {
            .four-zero-four {
                font-size: 140px;
            }

            .title {
                font-size: 28px;
            }

            .description {
                font-size: 16px;
                padding: 0 10px;
            }

            .home-btn {
                padding: 14px 40px;
                font-size: 16px;
                max-width: 250px;
            }

            .bg-bubbles li {
                opacity: 0.3;
            }
        }

        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 20px 10px;
            }

            .four-zero-four {
                font-size: 100px;
                gap: 5px;
            }

            .title {
                font-size: 24px;
            }

            .description {
                font-size: 15px;
                margin-bottom: 30px;
            }

            .home-btn {
                padding: 12px 30px;
                font-size: 15px;
                max-width: 220px;
            }

            @keyframes bounce {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-10px); }
            }
        }

        /* Landscape mode fix */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 10px;
            }

            .four-zero-four {
                font-size: 80px;
                margin-bottom: 5px;
            }

            .title {
                font-size: 20px;
                margin-bottom: 5px;
            }

            .description {
                font-size: 14px;
                margin-bottom: 15px;
            }

            .home-btn {
                padding: 8px 25px;
                font-size: 14px;
            }

            .bg-bubbles li {
                opacity: 0.2;
            }
        }

        /* Ensure no horizontal overflow */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        /* Small mobile devices */
        @media (max-width: 360px) {
            .four-zero-four {
                font-size: 80px;
            }

            .title {
                font-size: 20px;
            }

            .description {
                font-size: 14px;
            }

            .home-btn {
                padding: 10px 25px;
                font-size: 14px;
                max-width: 200px;
            }
        }
    </style>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated background bubbles with teal color -->
    <ul class="bg-bubbles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- Main Content -->
    <div class="container">
        <!-- 404 Number with Animation -->
        <div class="four-zero-four">
            <span>4</span>
            <span>0</span>
            <span>4</span>
        </div>

        <!-- Error Title -->
        <h1 class="title">Page Not Found</h1>

        <!-- Description -->
        <p class="description">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>

        <!-- Single Button - Back to Home with teal color -->
        <a href="home1.html" class="home-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>
    </div>

    <script>
        // Prevent any horizontal scroll issues
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.overflowX = 'hidden';
            
            // Add touch event handling for mobile
            const homeBtn = document.querySelector('.home-btn');
            if (homeBtn) {
                homeBtn.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.95)';
                });
                
                homeBtn.addEventListener('touchend', function() {
                    this.style.transform = 'scale(1)';
                });
            }
        });

        // Handle window resize to ensure no horizontal scroll
        window.addEventListener('resize', function() {
            document.body.style.overflowX = 'hidden';
        });
    </script>
</body>
</html>
