<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Stackly - Header</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8faff;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
        }

        /* Fixed Header Container */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(135deg, #79cee5, #1488CC);
            box-shadow: 0 4px 25px rgba(43, 50, 178, 0.2);
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            height: 80px;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            z-index: 1001;
            transition: all 0.3s ease;
            line-height: 0;
            flex-shrink: 0;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo img {
            height: 100px; 
            width: auto;
            max-width: 150px;
            display: block;
            border: none;
            outline: none;
            filter: brightness(0) invert(1);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu li {
            position: relative;
            list-style: none;
        }

        .nav-menu li a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
            padding: 8px 0;
            position: relative;
        }

        .nav-menu li a:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #FFD93D;
            transition: width 0.3s ease;
        }

        .nav-menu li a:hover:after {
            width: 80%;
        }

        .nav-menu li a:hover {
            color: #ffffff;
        }

        /* Dropdown Container - Only for Home button */
        .nav-item-with-dropdown {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 0;
        }

        .dropdown-icon {
            background: none;
            border: none;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            padding: 8px 5px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .dropdown-icon:hover {
            color: #FFD93D;
        }

        .dropdown-icon.active i {
            transform: rotate(180deg);
        }

        /* Dropdown Menu */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            min-width: 240px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(43, 50, 178, 0.15);
            padding: 12px 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            border: 1px solid rgba(43, 50, 178, 0.1);
        }

        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(10px);
        }

        .dropdown-menu li {
            list-style: none;
        }

        .dropdown-menu li a {
            padding: 12px 25px;
            display: block;
            color: #2d3748 !important;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .dropdown-menu li a i {
            width: 20px;
            color: #2B32B2;
            margin-right: 12px;
        }

        .dropdown-menu li a:hover {
            background: #f0f4ff;
            color: #2B32B2 !important;
            padding-left: 30px;
        }

        .dropdown-menu li a:hover:after {
            display: none;
        }

        /* Right side elements */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: 20px;
            flex-shrink: 0;
        }

        .contact-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 0;
            transition: color 0.3s;
            white-space: nowrap;
        }

        .contact-link:hover {
            color: #FFD93D;
        }

        .login-btn {
            background: #FFD93D;
            color: #2B32B2 !important;
            padding: 8px 25px !important;
            border-radius: 50px;
            font-weight: 600 !important;
            transition: all 0.3s ease;
            border: none;
            white-space: nowrap;
        }

        .login-btn:hover {
            background: #FFE566;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 217, 61, 0.3);
            color: #2B32B2 !important;
        }

        .login-btn:hover:after {
            display: none !important;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            padding: 5px;
            flex-shrink: 0;
        }

        .menu-toggle span {
            width: 30px;
            height: 3px;
            background: #ffffff;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Mobile Responsiveness - NO HORIZONTAL SCROLL */
        @media (max-width: 1024px) {
            .navbar {
                padding: 8px 20px;
            }
            
            .nav-menu {
                gap: 20px;
            }
        }

        @media (max-width: 900px) {
            .nav-menu {
                gap: 15px;
            }
            
            .nav-right {
                gap: 15px;
                margin-left: 15px;
            }
        }

        @media (max-width: 800px) {
            .menu-toggle {
                display: flex;
            }

            .nav-menu {
                position: fixed;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100vh;
                background: linear-gradient(135deg, #2B32B2, #1488CC);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 25px;
                transition: left 0.4s ease;
                z-index: 999;
                padding: 80px 20px 40px;
                overflow-y: auto;
                margin: 0;
            }

            .nav-menu.active {
                left: 0;
            }

            /* Hide logo when mobile menu is active */
            body:has(.nav-menu.active) .logo {
                opacity: 0 !important;
                visibility: hidden !important;
                pointer-events: none !important;
            }

            .nav-menu li {
                width: 100%;
                text-align: center;
                margin: 0;
            }

            .nav-menu li a {
                font-size: 18px;
                padding: 12px;
                display: inline-block;
                color: white;
                width: auto;
            }

            .nav-item-with-dropdown {
                justify-content: center;
            }

            .dropdown-icon {
                font-size: 16px;
                padding: 12px 10px;
                color: white;
            }

            .dropdown-menu {
                position: static;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                margin: 10px auto 0;
                width: 90%;
                max-width: 300px;
                border-radius: 15px;
                display: none;
                opacity: 1;
                visibility: visible;
                transform: none;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            .dropdown-menu.show {
                display: block;
            }

            .dropdown-menu li a {
                font-size: 16px !important;
                color: white !important;
                padding: 12px 20px;
            }

            .dropdown-menu li a i {
                color: #FFD93D;
            }

            .dropdown-menu li a:hover {
                background: rgba(255, 255, 255, 0.15);
                color: #FFD93D !important;
            }

            .nav-right {
                flex-direction: column;
                gap: 15px;
                margin-left: 0;
                width: 100%;
            }

            .contact-link {
                color: white;
                font-size: 18px;
            }

            .login-btn {
                background: #FFD93D;
                color: #2B32B2 !important;
                padding: 12px 40px !important;
                display: inline-block !important;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 8px 15px;
                height: 70px;
            }

            .logo img {
                height: 95px; 
                max-width: 130px;
            }

            .menu-toggle span {
                width: 25px;
            }
        }

        /* Ensure no horizontal scroll */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        /* Spacer for fixed header */
        .header-spacer {
            height: 80px;
            width: 100%;
        }

        @media (max-width: 480px) {
            .header-spacer {
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <!-- Header Only -->
    <header class="header">
        <nav class="navbar">
            <!-- Logo -->
            <a href="home2.html" class="logo">
                <img src="Stackly.webp" alt="Stackly">
            </a>

            <!-- Mobile Menu Toggle -->
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Navigation Menu -->
            <ul class="nav-menu" id="navMenu">
                <!-- Home with Dropdown -->
                <li>
                    <div class="nav-item-with-dropdown">
                        <a href="home2.html" class="nav-link">Home</a>
                        <button class="dropdown-icon" data-dropdown="homeDropdown">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    <ul class="dropdown-menu" id="homeDropdown">
                        <li><a href="home1.html"><i class="fas fa-home"></i> Homepage 1</a></li>
                    </ul>
                </li>
                
                <li>
                    <a href="post-job.html" class="nav-link">Post Job</a>
                </li>
                <li>
                    <a href="search-talent.html" class="nav-link">Search Talent</a>
                </li>
                <li class="nav-right">
                    <a href="contact.html" class="contact-link">Contact</a>
                    <a href="login2.html" class="nav-link login-btn">Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Spacer for fixed header -->
    <div class="header-spacer"></div>

    <!-- JavaScript for Functionality -->
    <script>
        // Get elements
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        const logo = document.querySelector('.logo');
        
        // Mobile menu toggle
        menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            this.classList.toggle('active');
            navMenu.classList.toggle('active');
            
            // Prevent body scroll when menu is open
            if (navMenu.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
                
                // Close all dropdowns when closing menu
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                document.querySelectorAll('.dropdown-icon').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        });

        // Dropdown functionality - For Home dropdown only
        document.querySelectorAll('.dropdown-icon').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const dropdownId = this.getAttribute('data-dropdown');
                const dropdown = document.getElementById(dropdownId);
                
                if (!dropdown) return;
                
                // Close other dropdowns
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    if (menu.id !== dropdownId) {
                        menu.classList.remove('show');
                    }
                });
                document.querySelectorAll('.dropdown-icon').forEach(btn => {
                    if (btn !== this) {
                        btn.classList.remove('active');
                    }
                });
                
                // Toggle current dropdown
                dropdown.classList.toggle('show');
                this.classList.toggle('active');
            });
        });

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.nav-item-with-dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                document.querySelectorAll('.dropdown-icon').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        });

        // Close mobile menu when clicking on a link
        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', function() {
                if (window.innerWidth <= 800) {
                    menuToggle.classList.remove('active');
                    navMenu.classList.remove('active');
                    document.body.style.overflow = 'auto';
                    
                    // Close all dropdowns
                    document.querySelectorAll('.dropdown-menu').forEach(menu => {
                        menu.classList.remove('show');
                    });
                    document.querySelectorAll('.dropdown-icon').forEach(btn => {
                        btn.classList.remove('active');
                    });
                }
            });
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth > 800) {
                menuToggle.classList.remove('active');
                navMenu.classList.remove('active');
                document.body.style.overflow = 'auto';
                
                // Close all dropdowns
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                document.querySelectorAll('.dropdown-icon').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        });

        // Escape key handler
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (navMenu.classList.contains('active')) {
                    menuToggle.classList.remove('active');
                    navMenu.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
                
                // Close all dropdowns
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
                document.querySelectorAll('.dropdown-icon').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
        });
    </script>
</body>
</html>
